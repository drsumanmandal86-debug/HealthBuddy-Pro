<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBuddy Pro - Social Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 text-center">
            <h2 class="text-4xl font-black text-blue-600 mb-2">HealthBuddy Pro</h2>
            <p class="text-gray-500 mb-8 font-medium">আপনার স্বাস্থ্য, আমাদের অগ্রাধিকার</p>
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="ইমেইল" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-2xl hover:bg-blue-700 shadow-lg transition-all active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex flex-col fixed h-full">
            <h2 class="text-xl font-bold text-blue-600 mb-10"><i class="fas fa-heartbeat mr-2"></i>HealthBuddy</h2>
            <nav class="flex-1 space-y-4">
                <a href="#" class="flex items-center p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold"><i class="fas fa-home mr-3"></i>ফিড (Home)</a>
                <button onclick="openModal()" class="w-full flex items-center p-3 text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition shadow-md"><i class="fas fa-plus mr-3"></i>নতুন পোস্ট</button>
            </nav>
            <button onclick="logout()" class="p-3 text-red-500 font-semibold text-left hover:bg-red-50 rounded-xl transition"><i class="fas fa-sign-out-alt mr-3"></i>লগ আউট</button>
        </aside>

        <main class="flex-1 md:ml-64 p-6 md:p-10">
            <div class="max-w-2xl mx-auto">
                <header class="mb-10">
                    <h1 class="text-3xl font-extrabold text-slate-800">হেলথ ফিড</h1>
                    <p class="text-slate-500">আপনার এবং আপনার বন্ধুদের আপডেট এখানে দেখুন।</p>
                </header>

                <div class="grid grid-cols-3 gap-4 mb-10">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 uppercase font-bold">Steps</p>
                        <p class="text-xl font-black text-blue-600" id="display-steps">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 uppercase font-bold">HR</p>
                        <p class="text-xl font-black text-red-500" id="display-hr">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 uppercase font-bold">Water</p>
                        <p class="text-xl font-black text-cyan-500" id="display-water">0</p>
                    </div>
                </div>

                <div id="health-feed" class="space-y-6">
                    <p class="text-center text-gray-400 py-10">ফিড লোড হচ্ছে...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 text-center">কী করছেন আজ?</h2>
            <div class="space-y-4">
                <input type="number" id="input-hr" placeholder="হার্ট রেট (bpm)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="input-steps" placeholder="আজকের ধাপ" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="input-water" placeholder="পানি পান (লিটার)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition">পোস্ট করুন</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold p-2">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCv0E3Qm_V4mDpcbCr8dQcpCv_2QmTwmyw",
            authDomain: "healthbuddy-pro.firebaseapp.com",
            projectId: "healthbuddy-pro",
            storageBucket: "healthbuddy-pro.firebasestorage.app",
            messagingSenderId: "898767277336",
            appId: "1:898767277336:web:8bb90251b348818512226d",
            measurementId: "G-64W8NEW1K6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { alert(e.message); }
        };
        window.logout = () => signOut(auth);
        window.openModal = () => document.getElementById('data-modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('data-modal').classList.add('hidden');

        // ডাটা সেভ (পোস্ট হিসেবে)
        window.saveData = async () => {
            const user = auth.currentUser;
            if (user) {
                const hData = {
                    userId: user.uid,
                    userName: document.getElementById('user-name-display')?.innerText || "User",
                    heartRate: document.getElementById('input-hr').value,
                    steps: document.getElementById('input-steps').value,
                    water: document.getElementById('input-water').value,
                    timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "posts"), hData);
                closeModal();
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                
                // রিয়েল-টাইম ফিড লোড (Facebook-এর মতো)
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const feedHtml = snapshot.docs.map(doc => {
                        const post = doc.data();
                        const date = post.timestamp ? new Date(post.timestamp.seconds * 1000).toLocaleString() : "এখনই";
                        return `
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                <div class="flex items-center mb-4">
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold mr-3">${post.userName[0]}</div>
                                    <div>
                                        <h4 class="font-bold text-slate-800">${post.userName}</h4>
                                        <p class="text-xs text-gray-400">${date}</p>
                                    </div>
                                </div>
                                <p class="text-slate-600 mb-4">আজকের অর্জন: 🏃 ${post.steps} কদম হেঁটেছি এবং 💧 ${post.water} লিটার পানি পান করেছি।</p>
                                <div class="flex space-x-4 text-gray-400 text-sm">
                                    <span><i class="far fa-heart mr-1"></i> লাইক</span>
                                    <span><i class="far fa-comment mr-1"></i> কমেন্ট</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    document.getElementById('health-feed').innerHTML = feedHtml;
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
