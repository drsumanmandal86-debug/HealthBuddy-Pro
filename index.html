<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBuddy Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 text-center">
            <h2 class="text-4xl font-black text-blue-600 mb-2">HealthBuddy Pro</h2>
            <p class="text-gray-500 mb-8 font-medium">আপনার স্বাস্থ্য, আমাদের অগ্রাধিকার</p>
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="ইমেইল" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
            <h2 class="text-xl font-bold text-blue-600 mb-10"><i class="fas fa-heartbeat mr-2"></i>HealthBuddy</h2>
            <nav class="flex-1 space-y-4">
                <a href="#" class="flex items-center p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold"><i class="fas fa-home mr-3"></i>ড্যাশবোর্ড</a>
                <a href="#" class="flex items-center p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition"><i class="fas fa-user-md mr-3"></i>ডাক্তার</a>
                <a href="#" class="flex items-center p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition"><i class="fas fa-chart-line mr-3"></i>হেলথ রিপোর্ট</a>
            </nav>
            <button onclick="logout()" class="mt-auto p-3 text-red-500 hover:bg-red-50 rounded-xl transition font-semibold text-left"><i class="fas fa-sign-out-alt mr-3"></i>লগ আউট</button>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-800">স্বাগতম, <span id="user-name-display" class="text-blue-600">...</span>!</h1>
                    <p class="text-slate-500">চলুন দেখে নিই আপনার আজকের হেলথ স্ট্যাটাস।</p>
                </div>
                <div class="flex items-center space-x-4 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xl" id="user-initials">SM</div>
                    <div>
                        <p class="font-bold text-slate-800" id="user-full-name">Suman Mandal</p>
                        <p class="text-xs text-slate-400" id="user-role-badge">General User</p>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer">
                    <div class="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center mb-4"><i class="fas fa-heart"></i></div>
                    <p class="text-gray-500 text-sm">হার্ট রেট</p>
                    <h3 class="text-2xl font-bold text-slate-800">72 bpm</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer">
                    <div class="w-10 h-10 bg-green-50 text-green-500 rounded-lg flex items-center justify-center mb-4"><i class="fas fa-walking"></i></div>
                    <p class="text-gray-500 text-sm">আজকের ধাপ</p>
                    <h3 class="text-2xl font-bold text-slate-800">4,520 steps</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center mb-4"><i class="fas fa-tint"></i></div>
                    <p class="text-gray-500 text-sm">পানি পান</p>
                    <h3 class="text-2xl font-bold text-slate-800">1.5 / 3 L</h3>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // আপনার কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCv0E3Qm_V4mDpcbCr8dQcpCv_2QmTwmyw",
            authDomain: "healthbuddy-pro.firebaseapp.com",
            projectId: "healthbuddy-pro",
            storageBucket: "healthbuddy-pro.firebasestorage.app",
            messagingSenderId: "898767277336",
            appId: "1:898767277336:web:8bb90251b348818512226d",
            measurementId: "G-64W8NEW1K6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // লগইন ফাংশন
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("লগইন এরর: " + error.message);
            }
        };

        // লগ আউট ফাংশন
        window.logout = () => signOut(auth);

        // ইউজারের অবস্থা চেক করা
        onAuthStateChanged(auth, async (user) => {
            const authDiv = document.getElementById('auth-section');
            const dashDiv = document.getElementById('dashboard-section');

            if (user) {
                authDiv.classList.add('hidden');
                dashDiv.classList.remove('hidden');
                
                // Firestore থেকে তথ্য আনা
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        document.getElementById('user-name-display').innerText = data.name;
                        document.getElementById('user-full-name').innerText = data.name;
                        document.getElementById('user-role-badge').innerText = data.role;
                        document.getElementById('user-initials').innerText = data.name.substring(0, 2).toUpperCase();
                    }
                } catch (e) { console.error("ডাটা আনতে সমস্যা:", e); }
            } else {
                authDiv.classList.remove('hidden');
                dashDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
