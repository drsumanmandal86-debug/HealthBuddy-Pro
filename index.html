<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBuddy Pro - Social & Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 text-center">
            <h2 class="text-4xl font-black text-blue-600 mb-2 text-center">HealthBuddy Pro</h2>
            <p class="text-gray-500 mb-8 font-medium">আপনার স্বাস্থ্য, আমাদের অগ্রাধিকার</p>
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="ইমেইল" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-2xl hover:bg-blue-700 shadow-lg transition-all active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex flex-col fixed h-full z-20">
            <h2 class="text-xl font-bold text-blue-600 mb-10"><i class="fas fa-heartbeat mr-2"></i>HealthBuddy</h2>
            <nav class="flex-1 space-y-4">
                <button onclick="showTab('feed')" id="btn-feed" class="w-full flex items-center p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold"><i class="fas fa-home mr-3"></i>ফিড (Home)</button>
                <button onclick="showTab('stats')" id="btn-stats" class="w-full flex items-center p-3 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold"><i class="fas fa-chart-line mr-3"></i>অ্যানালিটিক্স</button>
                <button onclick="openModal()" class="w-full flex items-center p-3 text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition shadow-md mt-4 font-bold"><i class="fas fa-plus mr-3"></i>নতুন পোস্ট</button>
            </nav>
            <button onclick="logout()" class="p-3 text-red-500 font-semibold text-left hover:bg-red-50 rounded-xl transition mt-auto"><i class="fas fa-sign-out-alt mr-3"></i>লগ আউট</button>
        </aside>

        <main class="flex-1 md:ml-64 p-6 md:p-10">
            <div class="max-w-2xl mx-auto">
                <div id="tab-feed">
                    <header class="mb-10 text-center md:text-left">
                        <h1 class="text-3xl font-extrabold text-slate-800">হেলথ ফিড</h1>
                        <p class="text-slate-500 text-sm">সবার আপডেট রিয়েল-টাইমে দেখুন।</p>
                    </header>
                    <div id="health-feed" class="space-y-6">
                        <p class="text-center text-gray-400 py-10">ফিড লোড হচ্ছে...</p>
                    </div>
                </div>

                <div id="tab-stats" class="hidden">
                    <header class="mb-10 text-center md:text-left">
                        <h1 class="text-3xl font-extrabold text-slate-800">অ্যানালিটিক্স</h1>
                        <p class="text-slate-500 text-sm">আপনার সাপ্তাহিক অগ্রগতির গ্রাফ।</p>
                    </header>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
                        <canvas id="healthChart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="data-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 text-center">কী করছেন আজ?</h2>
            <div class="space-y-4">
                <input type="number" id="input-hr" placeholder="হার্ট রেট (bpm)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="input-steps" placeholder="আজকের ধাপ" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="input-water" placeholder="পানি পান (লিটার)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition active:scale-95">পোস্ট করুন</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold p-2 text-sm">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCv0E3Qm_V4mDpcbCr8dQcpCv_2QmTwmyw",
            authDomain: "healthbuddy-pro.firebaseapp.com",
            projectId: "healthbuddy-pro",
            storageBucket: "healthbuddy-pro.firebasestorage.app",
            messagingSenderId: "898767277336",
            appId: "1:898767277336:web:8bb90251b348818512226d",
            measurementId: "G-64W8NEW1K6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Tab Switching
        window.showTab = (tab) => {
            const feedTab = document.getElementById('tab-feed');
            const statsTab = document.getElementById('tab-stats');
            const btnFeed = document.getElementById('btn-feed');
            const btnStats = document.getElementById('btn-stats');

            if(tab === 'feed') {
                feedTab.classList.remove('hidden');
                statsTab.classList.add('hidden');
                btnFeed.classList.add('bg-blue-50', 'text-blue-600');
                btnStats.classList.remove('bg-blue-50', 'text-blue-600');
            } else {
                feedTab.classList.add('hidden');
                statsTab.classList.remove('hidden');
                btnStats.classList.add('bg-blue-50', 'text-blue-600');
                btnFeed.classList.remove('bg-blue-50', 'text-blue-600');
                initChart(); // গ্রাফ লোড করা
            }
        };

        // গ্রাফ লজিক
        window.initChart = () => {
            const ctx = document.getElementById('healthChart').getContext('2d');
            // Chart.js গ্রাফ তৈরি
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                    datasets: [{
                        label: 'কদম (Steps)',
                        data: [4500, 5200, 4800, 7000, 6100, 8000, 5500],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        };

        // লগইন লজিক
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, password); } catch (e) { alert("লগইন এরর: " + e.message); }
        };

        window.logout = () => signOut(auth);
        window.openModal = () => document.getElementById('data-modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('data-modal').classList.add('hidden');

        // ডাটা সেভ
        window.saveData = async () => {
            const user = auth.currentUser;
            if (user) {
                const hData = {
                    userId: user.uid,
                    userName: user.email.split('@')[0], // ইমেইল থেকে নাম নেওয়া
                    heartRate: document.getElementById('input-hr').value,
                    steps: document.getElementById('input-steps').value,
                    water: document.getElementById('input-water').value,
                    timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "posts"), hData);
                closeModal();
            }
        };

        // রিয়েল-টাইম ডাটা লোডিং
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const feedHtml = snapshot.docs.map(doc => {
                        const post = doc.data();
                        const date = post.timestamp ? new Date(post.timestamp.seconds * 1000).toLocaleString('bn-BD') : "এখনই";
                        return `
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                <div class="flex items-center mb-4">
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold mr-3">${post.userName ? post.userName[0].toUpperCase() : 'U'}</div>
                                    <div>
                                        <h4 class="font-bold text-slate-800">${post.userName || 'ইউজার'}</h4>
                                        <p class="text-[10px] text-gray-400">${date}</p>
                                    </div>
                                </div>
                                <p class="text-slate-600 mb-4 text-sm">আজকের অর্জন: 🏃 ${post.steps} কদম হেঁটেছি এবং 💧 ${post.water} লিটার পানি পান করেছি।</p>
                                <div class="flex space-x-4 text-gray-400 text-xs">
                                    <span><i class="far fa-heart mr-1"></i> লাইক</span>
                                    <span><i class="far fa-comment mr-1"></i> কমেন্ট</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    document.getElementById('health-feed').innerHTML = feedHtml;
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
